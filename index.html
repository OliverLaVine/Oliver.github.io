<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给宝贝的每日刮刮乐 🎁</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
        }
        /* 主容器 - 响应式适配 */
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 30px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ff6b9d;
            font-size: clamp(22px, 6vw, 28px);
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255, 107, 157, 0.3);
        }
        .subtitle {
            color: #999;
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: clamp(20px, 4vw, 25px);
        }
        /* 刮刮乐区域 - 响应式高度 */
        .scratch-card {
            position: relative;
            width: 100%;
            height: clamp(180px, 40vw, 220px);
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(15px, 3vw, 20px);
        }
        .scratch-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none; /* 禁止移动端默认触摸行为 */
        }
        .prize-result {
            font-size: clamp(18px, 5vw, 22px);
            color: #ff6b9d;
            font-weight: bold;
            margin: clamp(10px, 2vw, 15px) 0;
            min-height: 30px;
        }
        .tip {
            color: #666;
            font-size: clamp(11px, 2.5vw, 13px);
            margin-top: 10px;
        }
        /* 按钮响应式 */
        .reset-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            padding: clamp(10px, 3vw, 12px) clamp(20px, 6vw, 30px);
            border-radius: 30px;
            font-size: clamp(14px, 3vw, 16px);
            cursor: pointer;
            margin-top: clamp(15px, 3vw, 20px);
            box-shadow: 0 4px 10px rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.4);
        }
        .reset-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💖 给宝贝的每日刮刮乐 💖</h1>
        <p class="subtitle">每天可以刮一次，看看今天的小惊喜是什么~</p>
        
        <div class="scratch-card">
            <img src="" alt="刮刮乐背景" id="bgImage">
            <canvas id="scratchCanvas"></canvas>
        </div>
        
        <div class="prize-result" id="prizeResult">请用手指/鼠标刮开涂层</div>
        <p class="tip">提示：在刮刮乐区域滑动即可刮开，每天仅限一次哦</p>
        
        <button class="reset-btn" id="resetBtn" disabled>明天再来刮吧~</button>
    </div>

    <script>
        // 0成本高甜奖品池（按概率权重分配，用心程度越高权重越低）
        const prizes = [
            { name: "谢谢惠顾", weight: 20 },
            { name: "早安吻一枚（超长版）", weight: 8 },
            { name: "睡前抱抱10分钟", weight: 8 },
            { name: "摸头杀+夸夸5分钟", weight: 7 },
            { name: "专属点歌一首（现场清唱）", weight: 7 },
            { name: "帮吹头发一次", weight: 6 },
            { name: "捏肩揉背15分钟", weight: 6 },
            { name: "免生气一次（小事不追究）", weight: 5 },
            { name: "陪刷剧/综艺不玩手机", weight: 5 },
            { name: "帮剥水果一盘", weight: 5 },
            { name: "手写情话小纸条一张", weight: 4 },
            { name: "专属表情包制作（1个）", weight: 4 },
            { name: "给对方讲一个暖心小故事", weight: 3 },
            { name: "模仿对方喜欢的爱豆说话", weight: 3 },
            { name: "一起拍搞怪合照9宫格", weight: 3 },
            { name: "给对方取专属昵称并喊一天", weight: 2 },
            { name: "一起完成一个小手工", weight: 2 },
            { name: "互道10句「我爱你」（不同语气）", weight: 2 },
            { name: "陪对方做一件TA喜欢的事", weight: 2 },
            { name: "给对方画一幅简笔画肖像", weight: 1.5 },
            { name: "一起列「想去的地方」清单", weight: 1.5 },
            { name: "重温第一次约会的场景/对话", weight: 1 },
            { name: "给对方写一封手写信", weight: 1 },
            { name: "策划一次10分钟的「惊喜小浪漫」", weight: 0.8 },
            { name: "一起回忆恋爱中的10个甜蜜瞬间", weight: 0.8 },
            { name: "给对方的朋友圈写走心评论", weight: 0.7 },
            { name: "约定一个只有两人知道的小暗号", weight: 0.7 },
            { name: "一起制定下周的「甜蜜小计划」", weight: 0.7 },
            { name: "给对方录一段「专属晚安语音」", weight: 0.5 },
            { name: "完成对方的一个「小小心愿」", weight: 0.5 }
        ];

        // 全局变量 - 记录今日中奖结果（防止重复抽奖）
        let todayPrize = null;
        let isPrizeGenerated = false; // 是否已生成今日奖品

        // 加权随机抽奖（仅执行一次）
        function getRandomPrize() {
            if (isPrizeGenerated) return todayPrize; // 已生成则直接返回
            
            let totalWeight = prizes.reduce((sum, prize) => sum + prize.weight, 0);
            let random = Math.random() * totalWeight;
            let currentWeight = 0;
            for (let prize of prizes) {
                currentWeight += prize.weight;
                if (random <= currentWeight) {
                    todayPrize = prize.name;
                    isPrizeGenerated = true; // 标记已生成
                    return todayPrize;
                }
            }
            todayPrize = "谢谢惠顾";
            isPrizeGenerated = true;
            return todayPrize;
        }

        // 初始化刮刮乐
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const prizeResult = document.getElementById('prizeResult');
        const resetBtn = document.getElementById('resetBtn');
        const bgImage = document.getElementById('bgImage');

        // 设置canvas尺寸（响应式）
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            drawScratchLayer();
        }

        // 绘制刮刮乐涂层
        function drawScratchLayer() {
            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#888';
            ctx.font = `bold clamp(18px, 5vw, 24px) "Microsoft Yahei"`;
            ctx.textAlign = 'center';
            ctx.fillText('刮开有奖', canvas.width / 2, canvas.height / 2 + 8);
        }

        // 监听刮动事件（兼容PC+移动端）
        let isScratching = false;
        function startScratch(e) {
            isScratching = true;
            scratch(e);
        }
        function scratch(e) {
            if (!isScratching) return;
            e.preventDefault();
            // 兼容移动端touch事件
            const touch = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            // 移动端刮擦半径适配
            const radius = Math.max(15, canvas.width * 0.05);
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }
        function stopScratch() {
            isScratching = false;
            checkScratched();
        }

        // 检查刮开面积，显示结果（刮开50%以上显示奖品）
        function checkScratched() {
            // 如果已经显示奖品，直接返回
            if (prizeResult.textContent.includes('恭喜你获得')) return;
            
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                let transparentPixels = 0;
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] < 128) transparentPixels++;
                }
                const percent = (transparentPixels / (canvas.width * canvas.height)) * 100;
                if (percent > 50) {
                    const prize = getRandomPrize(); // 仅首次执行时生成奖品
                    prizeResult.textContent = `🎉 恭喜你获得：${prize} 🎉`;
                    resetBtn.disabled = false;
                    // 记录刮奖日期到本地存储
                    localStorage.setItem('lastScratchDate', new Date().toDateString());
					localStorage.setItem('lastPride', prize);
                }
            } catch (e) {
                // 兼容跨域canvas读取问题
                const prize = getRandomPrize(); // 仅首次执行时生成奖品
                prizeResult.textContent = `🎉 恭喜你获得：${prize} 🎉`;
                resetBtn.disabled = false;
                localStorage.setItem('lastScratchDate', new Date().toDateString());
            }
        }

        // 检查是否今天已经刮过
        function checkTodayScratched() {
            const lastDate = localStorage.getItem('lastScratchDate');
            const today = new Date().toDateString();
            if (lastDate === today) {
				const lastPride = localStorage.getItem('lastPride');
                prizeResult.textContent = `🎉 今天已经中奖: ${lastPride}，明天再来吧~`;
                resetBtn.disabled = false;
                canvas.style.display = 'none';
            } else {
                prizeResult.textContent = '请用手指/鼠标刮开涂层';
                resetBtn.disabled = true;
                canvas.style.display = 'block';
                // 重置奖品状态
                todayPrize = null;
                isPrizeGenerated = false;
            }
        }

        // 重置按钮逻辑
        resetBtn.addEventListener('click', () => {
            const lastDate = localStorage.getItem('lastScratchDate');
            const today = new Date().toDateString();
            if (lastDate !== today) {
                resizeCanvas();
                prizeResult.textContent = '请用手指/鼠标刮开涂层';
                resetBtn.disabled = true;
                // 重置奖品状态
                todayPrize = null;
                isPrizeGenerated = false;
            } else {
                alert('今天已经刮过啦，明天再来吧~');
            }
        });

        // 初始化执行
        window.addEventListener('load', () => {
            // 替换为你提供的图片链接
            bgImage.src = 'https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/68d6a342b2f04e3192f87e121e300b99.png~tplv-a9rns2rl98-image.png?lk3s=8e244e95&rcl=202603111148402DD6F422C75A4DE9B0E8&rrcfp=dafada99&x-expires=2089424921&x-signature=7RiJjsGwtjIgN%2BRROa7SB7JIg1Y%3D';
            bgImage.onload = resizeCanvas;
            checkTodayScratched();
        });

        // 响应式适配
        window.addEventListener('resize', resizeCanvas);

        // PC端事件监听
        canvas.addEventListener('mousedown', startScratch);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('mouseup', stopScratch);
        canvas.addEventListener('mouseleave', stopScratch);

        // 移动端事件监听
        canvas.addEventListener('touchstart', startScratch);
        canvas.addEventListener('touchmove', scratch);
        canvas.addEventListener('touchend', stopScratch);
        canvas.addEventListener('touchcancel', stopScratch);
    </script>
</body>
</html>
